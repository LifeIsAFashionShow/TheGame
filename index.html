<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unity Web Player | Life Is A Fashion Show</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh; /* Asegura que ocupe al menos la altura de la pantalla */
        background: #231F20; /* Color de fondo que pediste */
        display: flex;
        justify-content: center; /* Centra horizontalmente */
        align-items: center;     /* Centra verticalmente */
        overflow-y: auto;        /* Scroll automático solo si es necesario */
      }
      
      #unity-canvas {
        width: 100vw;
        height: 56.25vw; /* Relación 16:9 */
        max-height: 100vh; 
        max-width: 177.78vh; /* Relación 16:9 */
        object-fit: contain;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
<script src="Build/ProyectoWeb_Build.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      
      // Forzamos el estilo ANTES de que Unity arranque
      canvas.style.width = "100vw";
      canvas.style.height = "56.25vw";
      canvas.style.maxHeight = "100vh";
      canvas.style.maxWidth = "177.78vh";
      canvas.style.objectFit = "contain";
      canvas.style.display = "block";

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/ProyectoWeb_Build.data",
        frameworkUrl: "Build/ProyectoWeb_Build.framework.js",
        codeUrl: "Build/ProyectoWeb_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Life Is A Fashion Show",
        productVersion: "1.0",
      }).then((unityInstance) => {
        // Opcional: ajustar el tamaño si la ventana cambia
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
