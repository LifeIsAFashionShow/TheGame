<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unity Web Player | Life Is A Fashion Show</title>
    <style>
      /* Eliminamos cualquier margen y fondo forzado */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent; /* Sin color de fondo para que sea transparente */
        display: flex;
        justify-content: center; /* Centrado horizontal */
        align-items: center;     /* Centrado vertical */
        overflow: hidden;        /* Evita scroll innecesario */
      }
      
      #unity-canvas {
        width: 100vw;
        height: 56.25vw;
        max-height: 100vh; 
        max-width: 177.78vh;
        object-fit: contain;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <script src="Build/ProyectoWeb_Build.loader.js"></script>
    <script>
      // Forzamos el canvas para evitar que Unity le meta estilos propios
      var canvas = document.querySelector("#unity-canvas");
      
      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/ProyectoWeb_Build.data",
        frameworkUrl: "Build/ProyectoWeb_Build.framework.js",
        codeUrl: "Build/ProyectoWeb_Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Life Is A Fashion Show",
        productVersion: "1.0",
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
